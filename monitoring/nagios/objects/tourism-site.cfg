# ============================================================
# Nagios object definitions for the Tourism Information Website
# Mounted directly into /opt/nagios/etc/objects/ by docker-compose.yml
# ============================================================

define host {
    use                     linux-server
    host_name               tourism-site-host
    alias                   Tourism Site Host
    address                 host.docker.internal   ; resolves to your host machine from inside the container
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               tourism-site-host
    service_description     HTTP - Website Availability
    check_command           check_http!-p 8081 -u /healthz
    max_check_attempts      3
    check_interval          1
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               tourism-site-host
    service_description     PING
    check_command           check_ping!100.0,20%!500.0,60%
    max_check_attempts      3
    check_interval          1
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}
