services:

  # Nagios Core - monitors host/service availability
  # Web UI: http://localhost:8084/nagios  (user: nagiosadmin / pass: nagios)
  nagios:
    image: jasonrivers/nagios:latest
    container_name: nagios-tourism
    restart: unless-stopped
    ports:
      - "8084:80"
    volumes:
      - ./nagios/objects/tourism-site.cfg:/opt/nagios/etc/objects/tourism-site.cfg
    environment:
      - NAGIOSADMIN_USER=nagiosadmin
      - NAGIOSADMIN_PASS=nagios
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Graphite - stores time-series metrics
  # Web UI: http://localhost:8090  |  Carbon ingest: 2013/tcp
  graphite:
    image: graphiteapp/graphite-statsd:latest
    container_name: graphite-tourism
    restart: unless-stopped
    ports:
      - "8090:80"
      - "2013:2003"
      - "2014:2004"
      - "8135:8125/udp"
      - "8136:8126"
    volumes:
      - graphite-storage:/opt/graphite/storage

  # Grafana - dashboards, reads metrics from Graphite
  # Web UI: http://localhost:3001  (admin/admin on first login)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-tourism
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana
    depends_on:
      - graphite

volumes:
  graphite-storage:
  grafana-storage:
